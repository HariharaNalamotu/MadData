services:
  - type: web
    name: chatdoc-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    # 'starter' plan: 512 MB RAM — sufficient now that all models run via HF API
    plan: starter
    region: oregon
    healthCheckPath: /health

    envVars:
      # Zilliz Cloud credentials — set these in the Render dashboard
      - key: CLUSTER_ENDPOINT
        sync: false
      - key: TOKEN
        sync: false

      # HuggingFace token — https://huggingface.co/settings/tokens (free account)
      # Used for both Legal-BERT embeddings and Mistral chat completions
      - key: HF_TOKEN
        sync: false

      # Optional: override the default chat model (mistralai/Mistral-7B-Instruct-v0.3)
      # - key: HF_CHAT_MODEL
      #   value: "HuggingFaceH4/zephyr-7b-beta"

      # Restrict CORS to your Vercel deployment URL in production.
      # Example: https://chatdoc.vercel.app
      # Leave as '*' for development / testing.
      - key: ALLOWED_ORIGINS
        value: "*"
