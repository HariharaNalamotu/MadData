services:
  - type: web
    name: chatdoc-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    # 'starter' plan: 512 MB RAM — sufficient now that all models run via HF API
    plan: starter
    region: oregon
    healthCheckPath: /health

    envVars:
      # Zilliz Cloud credentials — set these in the Render dashboard
      - key: CLUSTER_ENDPOINT
        sync: false
      - key: TOKEN
        sync: false

      # HuggingFace token — https://huggingface.co/settings/tokens (free account)
      # Used for Legal-BERT embeddings AND Llama generation via InferenceClient
      # NOTE: accept the Meta Llama license at huggingface.co/meta-llama first
      - key: HF_TOKEN
        sync: false

      # Chat model — Qwen2.5-72B-Instruct (Apache 2.0, no license gate)
      - key: HF_CHAT_MODEL
        value: "Qwen/Qwen2.5-72B-Instruct"

      # Restrict CORS to your Vercel deployment URL in production.
      # Example: https://chatdoc.vercel.app
      # Leave as '*' for development / testing.
      - key: ALLOWED_ORIGINS
        value: "*"
